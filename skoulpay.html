// Mapping mois calendrier -> label école
const MOIS_MAP={9:'Sep',10:'Oct',11:'Nov',12:'Déc',1:'Jan',2:'Fév',3:'Mar',4:'Avr',5:'Mai',6:'Jun'};
const MOIS_ORDER={Sep:0,Oct:1,Nov:2,Déc:3,Jan:4,Fév:5,Mar:6,Avr:7,Mai:8,Jun:9};

function getMoisActuel(){
  const m=new Date().getMonth()+1; // 1-12
  return MOIS_MAP[m]||null;
}

function getJourActuel(){return new Date().getDate();}

// Un mois est "passé" si son index dans l'année scolaire < index du mois actuel
function isMoisPasse(moisLabel){
  const actuel=getMoisActuel();
  if(!actuel)return false;
  return MOIS_ORDER[moisLabel] < MOIS_ORDER[actuel];
}
function isMoisActuel(moisLabel){return moisLabel===getMoisActuel();}
function isMoisFutur(moisLabel){
  const actuel=getMoisActuel();
  if(!actuel)return false;
  return MOIS_ORDER[moisLabel] > MOIS_ORDER[actuel];
}

// Logique impayé en retard :
// - mois passé : toujours en retard si impayé
// - mois actuel : en retard seulement si impayé ET aujourd'hui > jourLimite
// - mois futur : jamais en retard (pas encore échu)
function isEnRetard(moisLabel, statut, jourLimite){
  if(statut==='payé') return false;
  if(isMoisPasse(moisLabel)) return true;
  if(isMoisActuel(moisLabel)) return getJourActuel() > jourLimite;
  return false; // mois futur
}

// Pour un élève : est-il en retard sur UN des mois de la liste ?
function eleveEnRetard(paiement, moisList, jourLimite){
  if(!paiement) return true;
  if(paiement.inscr==='impayé') return true;
  return moisList.some(m=>isEnRetard(m, paiement.mois[m]||'impayé', jourLimite));
}

function av(t,c,sz=32){return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c};display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:${Math.round(sz*.34)}px;flex-shrink:0">${t}</div>`;}

function moisFromP(){if(S.periodeMode==='annee')return MOIS;if(S.periodeMode==='mois')return[S.periodeMois];const t={T1:['Sep','Oct','Nov'],T2:['Déc','Jan','Fév'],T3:['Mar','Avr','Mai'],T4:['Jun']};return t[S.periodeTrimes]||MOIS;}
function calcStats(eleves,pay,ml,inclI,jourLimite){
  const jl=jourLimite||10;
  let att=0,rec=0,nbR=0;
  eleves.forEach(e=>{
    const p=pay[e.id];if(!p)return;
    if(inclI){att+=e.inscr;if(p.inscr==='payé')rec+=e.inscr;}
    ml.forEach(m=>{
      // On compte dans l'attendu seulement les mois échus (passé + actuel si délai dépassé)
      const echu=isMoisPasse(m)||(isMoisActuel(m)&&getJourActuel()>=jl)||isMoisFutur(m)===false;
      att+=e.frais;
      if(p.mois?.[m]==='payé')rec+=e.frais;
    });
    if(eleveEnRetard(p,ml,jl))nbR++;
  });
  return{att,rec,nbR,taux:att>0?((rec/att)*100).toFixed(1):0,manq:att-rec};
}

    ${S.periodeMode==='trimestre'?`<select onchange="S.periodeTrimes=this.value;render()" style="width:auto;padding:5px 10px;font-size:12px">${['T1','T2','T3','T4'].map(t=>`<option${S.periodeTrimes===t?' selected':''}>${t}</option>`).join('')}</select>`:''}
    <span style="margin-left:auto;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:4px 11px;font-size:11px;font-weight:700;color:#0369a1">${lbl}</span>
    <span style="background:${getJourActuel()>S.config.jourLimite?'#fee2e2':'#f0fdf4'};border:1px solid ${getJourActuel()>S.config.jourLimite?'#fca5a5':'#86efac'};border-radius:8px;padding:4px 11px;font-size:11px;font-weight:700;color:${getJourActuel()>S.config.jourLimite?'#b91c1c':'#15803d'}">
      ${getJourActuel()>S.config.jourLimite?'⚠️ Délai dépassé (j.'+S.config.jourLimite+')':'✓ Délai : avant le '+S.config.jourLimite}
    </span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
    ${[{ic:'🧑‍🎓',l:'Élèves',v:ELEVES_DATA.length,c:'#0ea5e9',sub:'',hl:0},{ic:'📋',l:'Total attendu',v:st.att.toLocaleString()+' MAD',c:'#0ea5e9',sub:lbl,hl:1},{ic:'✅',l:'Total perçu',v:st.rec.toLocaleString()+' MAD',c:'#22c55e',sub:'Taux : '+st.taux+'%',hl:0},{ic:'❌',l:'Reste',v:st.manq.toLocaleString()+' MAD',c:'#ef4444',sub:st.nbR+' en retard',hl:0}].map(c=>`
    <div style="background:${c.hl?'#fffbeb':'white'};border-radius:14px;padding:14px;box-shadow:${c.hl?'0 0 0 2px #fbbf24,0 4px 12px rgba(0,0,0,.08)':'0 2px 10px rgba(0,0,0,.06)'};border-left:4px solid ${c.c}">
      <div style="width:38px;height:38px;border-radius:10px;background:${c.c}18;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px">${c.ic}</div>
      <div style="font-size:17px;font-weight:800;color:#1a1a2e">${c.v}</div>
      <div style="font-size:11px;font-weight:600;color:#64748b;margin-top:1px">${c.l}</div>
      ${c.sub?`<div style="font-size:10px;color:${c.hl?'#d97706':c.c};font-weight:700;margin-top:1px">${c.sub}</div>`:''}
    </div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div><div style="font-weight:700;font-size:14px;color:#1a1a2e">Taux de recouvrement</div><div style="font-size:11px;color:#64748b">${lbl}</div></div>
      <div style="font-size:24px;font-weight:800;color:${taux>75?'#22c55e':taux>50?'#f59e0b':'#ef4444'}">${st.taux}%</div>
    </div>
    <div style="background:#f1f5f9;border-radius:20px;height:16px;overflow:hidden;position:relative">
      <div style="width:${st.taux}%;height:100%;background:${taux>75?'#22c55e':taux>50?'#f59e0b':'#ef4444'};border-radius:20px;transition:width .6s"></div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#475569">${st.rec.toLocaleString()} MAD perçus</div>
    </div>
  </div>
  ${S.periodeMode==='mois'?`<div class="card"><div style="font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:12px">Élèves — ${S.periodeMois}</div><div style="display:grid;gap:6px">${ELEVES_DATA.map(e=>{
    const ok=S.paiements[e.id]?.mois[S.periodeMois]==='payé';
    const futur=isMoisFutur(S.periodeMois);
    const enR=isEnRetard(S.periodeMois,S.paiements[e.id]?.mois[S.periodeMois]||'impayé',S.config.jourLimite);
    const border=ok?'#86efac':enR?'#fca5a5':futur?'#e2e8f0':'#fde68a';
    const bg=ok?'#f0fdf4':enR?'#fff5f5':futur?'#f8fafc':'#fffbeb';
    const color=ok?'#15803d':enR?'#b91c1c':futur?'#94a3b8':'#b45309';
    const avColor=ok?'#22c55e':enR?'#ef4444':futur?'#94a3b8':'#f59e0b';
    const icon=ok?'✓ '+e.frais+' MAD':futur?'– futur':'✗ '+e.frais+' MAD';
    return`<div style="display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;background:${bg};border:1px solid ${border}">${av(e.nom.split(' ').map(n=>n[0]).join('').slice(0,2),avColor,28)}<div style="flex:1"><div style="font-weight:600;font-size:12px;color:#1a1a2e">${e.nom}</div><div style="font-size:10px;color:#64748b">${e.mat} · ${e.classe}</div></div><div style="font-weight:800;font-size:12px;color:${color}">${icon}</div></div>`;
  }).join('')}</div></div>`
  :`<div class="card"><div style="font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:12px">Détail par mois</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#f8fafc">${['Mois','Attendu','Perçu','Reste','Taux','Payés'].map(h=>`<th style="padding:8px 11px;text-align:left;font-weight:700;color:#64748b;font-size:11px">${h}</th>`).join('')}</tr></thead><tbody>${ml.map((m,i)=>{const a=ELEVES_DATA.reduce((s,e)=>s+e.frais,0);const r=ELEVES_DATA.reduce((s,e)=>s+(S.paiements[e.id]?.mois[m]==='payé'?e.frais:0),0);const tx=a>0?((r/a)*100).toFixed(0):0;const np=ELEVES_DATA.filter(e=>S.paiements[e.id]?.mois[m]==='payé').length;return`<tr style="border-top:1px solid #f1f5f9;background:${i%2===0?'white':'#fafbff'}"><td style="padding:8px 11px;font-weight:700;color:#1a1a2e">${m}</td><td style="padding:8px 9px;color:#0ea5e9;font-weight:600">${a.toLocaleString()}</td><td style="padding:8px 9px;color:#22c55e;font-weight:700">${r.toLocaleString()}</td><td style="padding:8px 9px;color:${a-r>0?'#ef4444':'#22c55e'};font-weight:600">${(a-r).toLocaleString()}</td><td style="padding:8px 11px"><div style="display:flex;align-items:center;gap:5px"><div style="flex:1;background:#f1f5f9;border-radius:20px;height:6px"><div style="width:${tx}%;height:100%;background:${tx>75?'#22c55e':tx>50?'#f59e0b':'#ef4444'};border-radius:20px"></div></div><span style="font-size:10px;font-weight:700;width:28px">${tx}%</span></div></td><td style="padding:8px 11px;text-align:center"><span style="font-weight:700;color:#22c55e">${np}</span><span style="color:#94a3b8;font-size:10px"> / ${ELEVES_DATA.length}</span></td></tr>`;}).join('')}</tbody></table></div></div>`}`;
}

// ─── SAISIR ───────────────────────────────────────────────────────────────────
function renderSaisir(){
  const list=ELEVES_DATA.filter(e=>{
    if(!e.nom.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filtre==='tous')return true;
    const p=S.paiements[e.id];
    const enR=eleveEnRetard(p,MOIS,S.config.jourLimite);
    return S.filtre==='retard'?enR:!enR;
  });
  const sel=ELEVES_DATA.find(e=>e.id===S.selEleve);const p=sel?S.paiements[sel.id]:null;
  const recu=sel&&p?(p.inscr==='payé'?sel.inscr:0)+MOIS.reduce((s,m)=>s+(p.mois[m]==='payé'?sel.frais:0),0):0;
  const att=sel?sel.inscr+MOIS.length*sel.frais:0;
  return renderLegende()+`<div style="display:grid;grid-template-columns:255px 1fr;gap:14px">
  <div class="card" style="padding:11px">
    <input placeholder="🔍 Rechercher..." value="${S.search}" oninput="S.search=this.value;updateListeEleves()" style="margin-bottom:8px"/>
    <div style="display:flex;gap:4px;margin-bottom:9px">
      ${[['tous','Tous','#475569'],['ok','Payés','#15803d'],['retard','Retard','#b91c1c']].map(([v,l,c])=>`<button onclick="S.filtre='${v}';updateListeEleves()" style="flex:1;padding:5px 3px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;background:${S.filtre===v?c+'22':'#f1f5f9'};color:${S.filtre===v?c:'#64748b'}">${l}</button>`).join('')}
    </div>
    <div id="liste-eleves" style="max-height:490px;overflow-y:auto">
      ${list.map(el=>{const nb=S.paiements[el.id]?MOIS.filter(m=>S.paiements[el.id].mois[m]==='impayé').length:MOIS.length;const enR=nb>0||S.paiements[el.id]?.inscr==='impayé';return`<div onclick="S.selEleve=${el.id};render()" style="padding:8px;border-radius:9px;margin-bottom:3px;cursor:pointer;background:${S.selEleve===el.id?'#f0f9ff':'transparent'};border:2px solid ${S.selEleve===el.id?'#0ea5e9':'transparent'}"><div style="display:flex;align-items:center;gap:7px">${av(el.nom.split(' ').map(n=>n[0]).join('').slice(0,2),enR?'#ef4444':'#0ea5e9',27)}<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12px;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${el.nom}</div><div style="font-size:10px;color:#94a3b8">${el.mat}</div></div>${enR?`<span style="background:#fee2e2;color:#b91c1c;border-radius:20px;padding:1px 5px;font-size:9px;font-weight:700">${nb}</span>`:'<span style="font-size:12px">✅</span>'}</div></div>`;}).join('')}
    </div>
  </div>
  ${sel&&p?`<div class="card">
    <div style="display:flex;align-items:center;gap:11px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #f1f5f9">
      ${av(sel.nom.split(' ').map(n=>n[0]).join('').slice(0,2),'#0ea5e9',42)}
      <div style="flex:1"><div style="font-size:16px;font-weight:800;color:#1a1a2e">${sel.nom}</div><div style="font-size:11px;color:#64748b">${sel.mat} · ${sel.classe} · ${sel.tuteur} · ${sel.tel}</div></div>
      <div style="text-align:right"><div style="font-size:16px;font-weight:800;color:${recu>=att?'#22c55e':'#ef4444'}">${recu.toLocaleString()} MAD</div><div style="font-size:10px;color:#94a3b8">/ ${att.toLocaleString()} MAD</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button onclick="mTout(${sel.id},'payé')" style="flex:1;padding:8px;border-radius:9px;border:2px solid #86efac;background:#dcfce7;color:#15803d;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit">✓ Tout payé</button>
      <button onclick="mTout(${sel.id},'impayé')" style="flex:1;padding:8px;border-radius:9px;border:2px solid #fca5a5;background:#fee2e2;color:#b91c1c;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit">✗ Tout impayé</button>
    </div>
    <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:7px">INSCRIPTION — ${sel.inscr} MAD</div>
    <button onclick="tInscr(${sel.id})" style="display:flex;align-items:center;gap:9px;width:100%;padding:10px 13px;border-radius:9px;border:2px solid ${p.inscr==='payé'?'#86efac':'#fca5a5'};background:${p.inscr==='payé'?'#dcfce7':'#fee2e2'};cursor:pointer;font-family:inherit;text-align:left;margin-bottom:14px">
      <div style="width:28px;height:28px;border-radius:7px;background:${p.inscr==='payé'?'#15803d22':'#b91c1c22'};display:flex;align-items:center;justify-content:center;font-size:15px;color:${p.inscr==='payé'?'#15803d':'#b91c1c'};font-weight:800">${p.inscr==='payé'?'✓':'✗'}</div>
      <div style="font-weight:700;font-size:12px;color:${p.inscr==='payé'?'#15803d':'#b91c1c'}">${p.inscr==='payé'?'Payé — cliquer pour changer':'Impayé — cliquer pour payer'}</div>
    </button>
    <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:1px;margin-bottom:9px">MENSUALITÉS — ${sel.frais} MAD/mois</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px">
      ${MOIS.map(m=>{
      const ok=p.mois[m]==='payé';
      const futur=isMoisFutur(m);
      const actuel=isMoisActuel(m);
      const enR=isEnRetard(m,p.mois[m]||'impayé',S.config.jourLimite);
      // couleur: vert=payé, rouge=en retard, orange=impayé mais pas encore échu, gris=futur
      const border=ok?'#86efac':enR?'#fca5a5':futur?'#e2e8f0':'#fde68a';
      const bg=ok?'#dcfce7':enR?'#fee2e2':futur?'#f8fafc':'#fffbeb';
      const color=ok?'#15803d':enR?'#b91c1c':futur?'#94a3b8':'#b45309';
      const icon=ok?'✓':futur?'–':'✗';
      return`<button onclick="tMois(${sel.id},'${m}')" style="padding:9px 3px;border-radius:9px;border:2px solid ${border};background:${bg};cursor:pointer;text-align:center;font-family:inherit;position:relative">
        ${actuel?`<div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:white;border-radius:20px;padding:1px 6px;font-size:8px;font-weight:700;white-space:nowrap">Actuel</div>`:''}
        <div style="font-size:13px;color:${color}">${icon}</div>
        <div style="font-size:11px;font-weight:800;color:${color}">${m}</div>
        <div style="font-size:9px;color:${color};opacity:.8">${sel.frais}</div>
      </button>`;}).join('')}
    </div>
  </div>`:`<div class="card" style="display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;min-height:200px">← Sélectionnez un élève</div>`}
  </div>`;
}

// ─── ALERTES ──────────────────────────────────────────────────────────────────
function renderAlertes(){
  const C={critique:'#b91c1c',moyen:'#b45309',faible:'#1d4ed8'};
  const B={critique:'#fee2e2',moyen:'#fef3c7',faible:'#dbeafe'};
  const I={critique:'🚨',moyen:'⚠️',faible:'ℹ️'};
  const jl=S.config.jourLimite;
  const al=ELEVES_DATA.map(e=>{
    const p=S.paiements[e.id];if(!p)return null;
    // Seulement les mois réellement en retard (passés ou actuel si délai dépassé)
    const mi=MOIS.filter(m=>isEnRetard(m,p.mois[m]||'impayé',jl));
    const inscI=p.inscr==='impayé';
    if(!inscI&&mi.length===0)return null;
    const mt=mi.length*e.frais+(inscI?e.inscr:0);
    const nv=mi.length>3||inscI?'critique':mi.length>1?'moyen':'faible';
    return{...e,mi,inscI,mt,nv};
  }).filter(Boolean).sort((a,b)=>b.mt-a.mt);
  return renderLegende()+`<div class="card" style="margin-bottom:14px"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">${Object.entries({critique:'Inscription impayée ou +3 mois',moyen:'2-3 mois impayés',faible:'1 mois impayé'}).map(([nv,d])=>`<div style="background:${B[nv]};border-radius:9px;padding:10px;border:1px solid ${C[nv]}33"><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="font-size:15px">${I[nv]}</span><span style="font-weight:700;font-size:12px;color:${C[nv]}">${nv.charAt(0).toUpperCase()+nv.slice(1)}</span></div><div style="font-size:11px;color:#475569">${d}</div></div>`).join('')}</div><div style="font-size:12px;color:#64748b">📅 Date limite : <b style="color:#1a1a2e">le ${S.config.jourLimite} du mois</b></div></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">${['critique','moyen','faible'].map(nv=>{const n=al.filter(a=>a.nv===nv).length;const m=al.filter(a=>a.nv===nv).reduce((s,a)=>s+a.mt,0);return`<div style="background:white;border-radius:11px;padding:13px;box-shadow:0 2px 8px rgba(0,0,0,.05);border-left:4px solid ${C[nv]};display:flex;align-items:center;gap:9px"><span style="font-size:20px">${I[nv]}</span><div><div style="font-size:18px;font-weight:800;color:${C[nv]}">${n}</div><div style="font-size:11px;color:#64748b">${m.toLocaleString()} MAD</div></div></div>`;}).join('')}</div>
  <div style="display:grid;gap:9px">${al.map(e=>`<div style="background:white;border-radius:11px;padding:12px 15px;box-shadow:0 2px 8px rgba(0,0,0,.05);border-left:4px solid ${C[e.nv]};display:flex;align-items:center;gap:11px"><div style="width:38px;height:38px;border-radius:10px;background:${B[e.nv]};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${I[e.nv]}</div><div style="flex:1"><div style="font-weight:700;color:#1a1a2e;font-size:13px">${e.nom} <span style="color:#94a3b8;font-weight:400;font-size:11px">· ${e.mat} · ${e.classe}</span></div><div style="font-size:11px;color:#64748b">${e.tuteur} · ${e.tel}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${e.inscI?`<span style="background:${B[e.nv]};color:${C[e.nv]};border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700">Inscription</span>`:''}${e.mi.map(m=>`<span style="background:${B[e.nv]};color:${C[e.nv]};border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700">${m}</span>`).join('')}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:800;color:${C[e.nv]}">${e.mt.toLocaleString()} MAD</div></div></div>`).join('')}${al.length===0?`<div style="text-align:center;color:#22c55e;padding:36px;font-size:14px;font-weight:700">🎉 Tous les paiements sont à jour !</div>`:''}</div>`;
}

// ─── RAPPORT ──────────────────────────────────────────────────────────────────
function renderRapport(){
  const tr=ELEVES_DATA.reduce((s,e)=>{const p=S.paiements[e.id];if(!p)return s;return s+(p.inscr==='payé'?e.inscr:0)+MOIS.reduce((ms,m)=>ms+(p.mois?.[m]==='payé'?e.frais:0),0);},0);
  const ta=ELEVES_DATA.reduce((s,e)=>s+e.inscr+MOIS.length*e.frais,0);
  return renderLegende()+`<div class="card" style="margin-bottom:14px"><div style="font-weight:800;font-size:15px;color:#1a1a2e;margin-bottom:12px">📥 Rapport complet</div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:13px;border-radius:9px;border:1.5px solid #86efac;background:#f0fdf4">
    <div><div style="font-weight:700;color:#15803d;font-size:13px">Rapport annuel 2024-2025</div><div style="font-size:11px;color:#64748b;margin-top:2px">${tr.toLocaleString()} / ${ta.toLocaleString()} MAD perçus</div></div>
    <button onclick="dlCSV()" style="padding:9px 18px;border-radius:8px;border:none;background:#15803d;color:white;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">⬇ Télécharger CSV</button>
  </div></div>

function lireFichier(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let rows=[];
      if(ext==='csv'||ext==='txt'){
        const txt=e.target.result;
        const lines=txt.split(/\r?\n/).filter(l=>l.trim());
        // Detect separator
        const sep=lines[0].includes(';')?';':',';
        const clean=l=>l.replace(/^"|"$/g,'').trim();
        const headers=lines[0].split(sep).map(clean).map(h=>h.toLowerCase());
        rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
          const vals=l.split(sep).map(clean);
          const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||'';});
          return obj;
        });
      } else {
        const XLSX=window._XLSX;if(!XLSX){alert('SheetJS pas encore chargé, réessayez dans 2 secondes');return;}
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      }
      // Normaliser les colonnes
      const findCol=(obj,keys)=>{for(const k of Object.keys(obj)){for(const kw of keys){if(k.toLowerCase().includes(kw))return obj[k];}}return '';};
      const preview=rows.map((r,i)=>({
        id: ELEVES_DATA.length + i + 1,
        mat:  String(findCol(r,['matricule','mat'])||'2024-'+(100+ELEVES_DATA.length+i+1)),
        nom:  String(findCol(r,['nom','name','prenom'])||''),
        classe:String(findCol(r,['classe','class'])||''),
        niveau:String(findCol(r,['niveau','level'])||''),
        tuteur:String(findCol(r,['tuteur','parent','responsable'])||''),
        tel:   String(findCol(r,['tel','phone','mobile'])||''),
        frais: parseFloat(findCol(r,['frais_m','frais mensuel','mensuel','frais/m'])||findCol(r,['frais'])||0)||0,
        inscr: parseFloat(findCol(r,['inscr','inscription'])||0)||0,
      })).filter(r=>r.nom.trim());
      if(!preview.length){alert('Aucun élève trouvé. Vérifiez le format du fichier.');return;}
      S.importPreview=preview;render();
    }catch(err){alert('Erreur lecture fichier : '+err.message);}
  };
  if(ext==='csv'||ext==='txt') reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
  input.value='';
}

async function confirmerImport(mode){
  const preview=S.importPreview;if(!preview)return;
  if(mode==='remplacer'){
    ELEVES_DATA.length=0;
    let maxId=0;
    preview.forEach(e=>{ELEVES_DATA.push(e);if(e.id>maxId)maxId=e.id;});
    // Init paiements pour les nouveaux
    preview.forEach(e=>{if(!S.paiements[e.id]){S.paiements[e.id]={inscr:'impayé',mois:{}};MOIS.forEach(m=>{S.paiements[e.id].mois[m]='impayé';});}});
  } else {
    const maxId=ELEVES_DATA.length>0?Math.max(...ELEVES_DATA.map(e=>e.id)):0;
    preview.forEach((e,i)=>{
      e.id=maxId+i+1;
      ELEVES_DATA.push(e);
      S.paiements[e.id]={inscr:'impayé',mois:{}};
      MOIS.forEach(m=>{S.paiements[e.id].mois[m]='impayé';});
    });
  }
  // Sauvegarder dans Supabase
  if(sb && S.user){
    const ecole = S.user.ecole||'';
    const toInsert = (mode==='remplacer'?preview:preview).map(e=>({
      matricule:e.mat, nom:e.nom, classe:e.classe||'',
      niveau:e.niveau||'', frais:e.frais||0, inscr:e.inscr||0,
      tuteur:e.tuteur||'', tel:e.tel||'', ecole
    }));
    if(mode==='remplacer'){
      await sb.from('eleves').delete().eq('ecole',ecole);
    }
    if(toInsert.length>0) await sb.from('eleves').insert(toInsert);
  }
  S.importPreview=null;S.importMode=null;
  render();
}

function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=renderLogin();return;}
  let body='';
  if(S.tab==='dashboard')body=renderDashboard();
  else if(S.tab==='saisir')body=renderSaisir();
  else if(S.tab==='alertes')body=renderAlertes();
  else if(S.tab==='rapport')body=renderRapport();
  else if(S.tab==='eleves')body=renderEleves();
  else if(S.tab==='admin')body=renderAdmin();
  else if(S.tab==='params')body=renderParams();
  app.innerHTML=renderTopbar()+renderTabs()+`<div style="max-width:1200px;margin:0 auto;padding:20px 16px">${body}</div>`;
}
async function doLogin(){
  const l=document.getElementById('li')?.value||'';
  const m=document.getElementById('mp')?.value||'';
  
  // Afficher chargement
  const btn=document.querySelector('button[onclick="doLogin()"]');
  if(btn){btn.textContent='Connexion...';btn.disabled=true;}
  
  // Essai Supabase d'abord
  let u = await sbLogin(l, m);
  
  // Fallback local si Supabase pas dispo
  if(!u) u = S.users.find(x=>x.login===l&&x.mdp===m);
  
  if(u){
    S.user=u;
    S.tab='dashboard';
    // Charger les données de l'école
    render(); // afficher dashboard vide pendant chargement
    await chargerDonnees(u);
    render(); // re-render avec données
  } else {
    const e=document.getElementById('err');
    if(e){e.style.display='block';e.textContent='Identifiants incorrects';}
    if(btn){btn.textContent='Se connecter →';btn.disabled=false;}
  }
}
function qLogin(l,m){const i=document.getElementById('li');const p=document.getElementById('mp');if(i)i.value=l;if(p)p.value=m;}
function logout(){S.user=null;S.tab='dashboard';render();}
function setTab(t){S.tab=t;render();}
initSupabase();
render();
</script>
</body>
